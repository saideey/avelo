<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Road/Speed mark -->
  <path d="M8 38 L22 12 L36 38" stroke="url(#grad1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M14 28 L22 16 L30 28" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="22" cy="40" r="2.5" fill="url(#grad1)"/>

  <!-- Speed lines -->
  <line x1="2" y1="25" x2="8" y2="25" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="0" y1="31" x2="10" y2="31" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- AVELO text -->
  <text x="48" y="35" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.5">
    <tspan fill="#1E3A5F">AV</tspan><tspan fill="#2563EB">ELO</tspan>
  </text>

  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
</svg>
